name: Build vamOS-style system image for Xiaomi Pad 5 (nabu)

on:
  workflow_dispatch:
    inputs:
      void_version:
        description: 'Void Linux RootFS Version'
        required: false
        default: '20250202'

jobs:
  build-system:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io || true
          if command -v docker &> /dev/null; then
            echo "Docker installed"
          else
            curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
            sudo sh /tmp/get-docker.sh
          fi

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static \
            xz-utils \
            coreutils \
            curl \
            e2fsprogs \
            fakeroot \
            android-sdk-libsparse-utils \
            jq \
            bc \
            unzip

      - name: Setup QEMU
        run: |
          docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Download Void RootFS
        env:
          VOID_VERSION: ${{ github.event.inputs.void_version }}
        run: |
          mkdir -p build/downloads
          wget -q "https://repo-default.voidlinux.org/live/current/void-aarch64-ROOTFS-${VOID_VERSION}.tar.xz" \
            -O "build/downloads/void-aarch64-ROOTFS-${VOID_VERSION}.tar.xz"

      - name: Download Kernel
        run: |
          mkdir -p build/kernel
          wget -q "https://github.com/0312birdzhang/xiaomi-nabu/releases/download/0.0.1/xiaomi-nabu-linux-6.17.0-UFS-slowdown.tar.zip" \
            -O build/kernel/kernel.tar.zip
          unzip -q build/kernel/kernel.tar.zip -d build/kernel/
          rm build/kernel/kernel.tar.zip

      - name: Build Docker Builder Image
        run: |
          docker build -f rootfs-tools/build/Dockerfile.builder -t nabu-builder .

      - name: Build RootFS Docker Image
        run: |
          docker buildx build -f rootfs-tools/build/Dockerfile \
            --platform=linux/arm64 \
            --tag nabu-rootfs:latest \
            --build-arg VOID_ROOTFS="build/downloads/void-aarch64-ROOTFS-20250202.tar.xz" \
            --build-arg UNAME="runner" \
            --build-arg UID="1001" \
            --build-arg GID="121" \
            --load \
            .

      - name: Export RootFS from Container
        run: |
          CONTAINER_ID=$(docker create nabu-rootfs:latest)
          docker export "$CONTAINER_ID" -o build/rootfs.tar
          docker rm "$CONTAINER_ID"

      - name: Create System Image
        run: |
          mkdir -p build/tmp-system build/output

          fallocate -l 4G build/system.img
          mkfs.ext4 -L "nabu-rootfs" build/system.img

          sudo mount -o loop,rw build/system.img build/tmp-system
          sudo tar -xf build/rootfs.tar -C build/tmp-system
          sudo rm -f build/tmp-system/.dockerenv
          sudo umount build/tmp-system

      - name: Install Kernel from Tarball
        run: |
          KERNEL_TAR=$(find build/kernel -name "*.tar" 2>/dev/null | head -1)
          if [ -n "$KERNEL_TAR" ]; then
            sudo mount -o loop,rw build/system.img build/tmp-system
            sudo tar -xf "$KERNEL_TAR" -C build/tmp-system/
            sudo umount build/tmp-system
            echo "Kernel installed from: $KERNEL_TAR"
          else
            echo "No kernel tarball found"
            ls -la build/kernel/
          fi

      - name: Create Sparse Image
        run: |
          img2simg build/system.img build/output/system.img
          rm -f build/system.img

      - name: Upload System Images
        uses: actions/upload-artifact@v5
        with:
          name: nabu-system-images
          path: build/output/system.img
          if-no-files-found: error