name: Build and Test arm64 .deb Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    # Nutzt die nativen ARM-Runner von GitHub
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v4 ist aktuell die stabile Hauptversion für Checkout

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg sed gzip build-essential

      - name: Create Debian Package Structure
        run: |
          # Verzeichnisstruktur anlegen
          mkdir -p build/dummy-pkg/DEBIAN
          mkdir -p build/dummy-pkg/usr/share/doc/dummy-pkg

          # 1. Control-Datei erstellen (Wichtig: Architecture arm64)
          cat <<EOF > build/dummy-pkg/DEBIAN/control
          Package: dummy-pkg
          Version: 6.17.0-xiaomi-nabu-tmm-UFS-slowdown+
          Section: base
          Priority: optional
          Architecture: arm64
          Maintainer: GitHub Action <action@github.com>
          Description: Dummy-Paket für nativen arm64 Test
          EOF

          # 2. Postinst-Skript erstellen
          # Wir nutzen 'EOF' in Quotes, damit $ Variablen erst im Zielsystem ausgewertet werden
          cat <<'EOF' > build/dummy-pkg/DEBIAN/postinst
          #!/bin/bash
          set -e
          echo "========================================"
          echo "POSTINST RUNNING ON: $(uname -m)"
          
          # Deine drei Methoden:
          
          VERSION=$(dpkg-query --show --showformat='${Version}' $DPKG_MAINTSCRIPT_PACKAGE)
          echo "1. dpkg-query: $VERSION"

          VERSION=$(dpkg -s $DPKG_MAINTSCRIPT_PACKAGE | sed -n 's/^Version: //p')
          echo "2. dpkg -s: $VERSION"

          VERSION=$(zless /usr/share/doc/$DPKG_MAINTSCRIPT_PACKAGE/changelog* | dpkg-parsechangelog -l- -SVersion)
          echo "3. changelog: $VERSION"
          
          echo "========================================"
          EOF

          # Rechte setzen
          chmod 755 build/dummy-pkg/DEBIAN/postinst

          # 3. Minimales Changelog für Methode 3
          cat <<EOF > build/dummy-pkg/usr/share/doc/dummy-pkg/changelog
          dummy-pkg (1.0.0) unstable; urgency=low
            * Native arm64 build test.
           -- GitHub Action <action@github.com>  $(date -R)
          EOF
          gzip -n -9 build/dummy-pkg/usr/share/doc/dummy-pkg/changelog

      - name: Build .deb Package
        run: dpkg-deb --build build/dummy-pkg

      - name: Install and Verify Package
        run: |
          # Hier wird das Paket installiert und der Output von postinst erscheint im Log
          sudo dpkg -i build/dummy-pkg.deb
          
          # Verifizierung der installierten Version
          dpkg -l | grep dummy-pkg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # v4 ist aktuell, v5 existiert für Artifacts noch nicht (Stand 2024/25)
        with:
          name: dummy-pkg-arm64
          path: build/dummy-pkg.deb
